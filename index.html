<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DX Survey Result Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 p-4 sm:p-6 md:p-8 font-sans">
  <div class="max-w-6xl mx-auto space-y-6 md:space-y-8">
    <div class="rounded-[2rem] bg-gradient-to-r from-indigo-700 via-blue-600 to-cyan-500 p-8 sm:p-10 md:p-14 shadow-2xl text-center">
      <p class="text-4xl md:text-5xl tracking-[0.25em] text-white/95 font-bold">関西DX指数</p>
      <h1 id="dxScore" class="text-7xl sm:text-8xl md:text-[10rem] font-black mt-4 text-white leading-none">0pt</h1>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 text-left max-w-5xl mx-auto">
        <div class="bg-white/15 backdrop-blur rounded-2xl p-4">
          <p class="text-sm text-white/80">回答企業数</p>
          <p class="text-2xl md:text-3xl font-extrabold text-white mt-1">1,248社</p>
        </div>
        <div class="bg-white/15 backdrop-blur rounded-2xl p-4">
          <p class="text-sm text-white/80">対象社数</p>
          <p class="text-2xl md:text-3xl font-extrabold text-white mt-1">3,190社</p>
        </div>
        <div class="bg-white/15 backdrop-blur rounded-2xl p-4">
          <p class="text-sm text-white/80">集計時点</p>
          <p class="text-xl md:text-2xl font-extrabold text-white mt-1">2026年10月時点</p>
        </div>
      </div>
    </div>
      <div class="max-w-5xl mx-auto pt-2 pb-1">
        <p class="text-left text-3xl md:text-5xl font-extrabold text-slate-900">他社と比較が可能です</p>
        <div class="mt-3 h-1.5 w-28 bg-cyan-500 rounded-full"></div>
        <p class="mt-4 text-left text-sm md:text-lg text-slate-700">集計期間：2025年4月〜2026年10月（リアルタイム集計中）</p>
        <p class="mt-1 text-left text-sm md:text-lg text-slate-700">以下の比較データから、自社の立ち位置を確認できます</p>
      </div>

    <div id="comparisonContainer" class="grid grid-cols-1 gap-6"></div>
  </div>

  <script>
    const userScore = 4;
    const percentile = 82;

    const comparisons = [
      {
        label: "全体平均",
        avgLevel: 3.8,
        diff: "+0.2",
        companies: "1,248社",
        dist: [12, 24, 28, 18, 11, 7],
        accent: "cyan",
      },
      {
        label: "同業種平均",
        avgLevel: 4.4,
        diff: "-0.4",
        companies: "326社",
        dist: [8, 14, 22, 26, 18, 12],
        accent: "cyan",
      },
      {
        label: "同規模平均",
        avgLevel: 3.5,
        diff: "+0.5",
        companies: "412社",
        dist: [15, 26, 25, 17, 10, 7],
        accent: "cyan",
      },
      {
        label: "2024年度DX推進指標(出展：IPA)",
        avgLevel: 3.0,
        diff: "+1.0",
        companies: "1,349社",
        dist: [2, 30, 31, 24, 11, 1],
        accent: "orange",
      },
    ];

    const stages = [
      { name: "未着手", rate: 12 },
      { name: "全社戦略は不明確だが、一部の組織で実施中", rate: 24 },
      { name: "全社戦略に基づき、一部の組織で推進中", rate: 28 },
      { name: "全社戦略に基づき、組織横断で推進中", rate: 18 },
      { name: "（④を満たした上で）継続的かつ組織横断的に取り組み状況のモニタリングや見直しを行っている", rate: 11 },
      { name: "（⑤を満たした上で）個社の範囲を超えて、社会価値を創出している*", rate: 7 },
    ];

    const container = document.getElementById("comparisonContainer");

    comparisons.forEach((item) => {
      const card = document.createElement("div");

      const cardStyle = isReference
        ? "bg-slate-50 rounded-3xl p-6 sm:p-8 md:p-10 border border-slate-300 shadow-md"
        : "bg-white rounded-3xl p-6 sm:p-8 md:p-10 border border-slate-200 shadow-lg";

      const avgLineTop = ((item.avgLevel - 1) * 32) + 16;

      card.innerHTML = `
        <p class="text-lg md:text-xl text-slate-700 font-semibold">${item.label}</p>
        <p class="text-4xl sm:text-5xl md:text-6xl font-extrabold mt-3">${item.avgLevel}</p>
        <p class="mt-2 ${accentText} text-xl md:text-2xl font-semibold">平均との差：${item.diff}</p>
        <p class="mt-2 text-sm md:text-base text-slate-700">回答企業数：${item.companies}</p>

        <div class="mt-6">
          <div class="${isReference ? "bg-white" : "bg-slate-50"} rounded-xl py-4 px-4 relative">
            <div class="relative">
              ${item.dist.map((v, i) => `
                <div class="grid grid-cols-[340px_1fr] items-center gap-2 h-8 mb-1">
                  <span class="text-[11px] md:text-[13px] text-slate-700 leading-tight pr-2">${i + 1}. ${stages[i].name}</span>
                  <div class="h-8 bg-slate-200 relative overflow-visible">
                    <div class="${i + 1 === userScore ? accentBar : "bg-slate-500"} h-full relative" style="width:0%" data-target-width="${v * 3}%">
                      <span class="absolute -right-10 top-1/2 -translate-y-1/2 text-xs md:text-sm text-slate-900 font-semibold">${v}%</span>
                    </div>
                  </div>
                </div>
              `).join("")}

              <div class="absolute left-[348px] right-0 h-[1px] ${accentLine} z-20 pointer-events-none" style="top:${avgLineTop}px"></div>
            </div>
          </div>
        </div>

        <p class="mt-6 text-[8px] md:text-sm text-slate-600 leading-relaxed italic">
          *例えば、「高度なリーダーシップを発揮し、多様なステークホルダーを巻き込んだDXの推進」、「先進的なモデルの創出」などが期待されるなど。
        </p>
      `;

      container.appendChild(card);
    });

    let current = 0;
    const target = 14582;
    const scoreEl = document.getElementById("dxScore");
    const step = Math.ceil(target / 80);

    const counter = setInterval(() => {
      current += step;
      if (current >= target) {
        current = target;
        clearInterval(counter);
      }
      scoreEl.textContent = current.toLocaleString() + "pt";
    }, 20);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const bars = entry.target.querySelectorAll("[data-target-width]");
          bars.forEach((bar, idx) => {
            setTimeout(() => {
              bar.style.transition = "width 0.9s ease-out";
              bar.style.width = bar.dataset.targetWidth;
            }, idx * 80);
          });
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.35 });

    document.querySelectorAll("#comparisonContainer > div").forEach((card) => {
      observer.observe(card);
    });
  </script>
</body>
</html>
