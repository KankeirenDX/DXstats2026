<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>関西DX指数 - 診断結果詳細</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .header-card {
      background: linear-gradient(135deg, #091525 0%, #0b1e38 50%, #061520 100%);
      border: 1px solid #1a3050; border-radius: 20px; padding: 40px 32px;
      text-align: center; position: relative;
    }
    .header-score {
      font-family: 'Share Tech Mono', monospace; font-size: clamp(48px, 10vw, 80px);
      color: #fff; text-shadow: 0 0 30px #00d4ff;
    }
    .bar-container { height: 24px; background: #e2e8f0; border-radius: 6px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; transition: width 1s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-800">

<div id="mainContent" class="max-w-4xl mx-auto space-y-6 hidden">
  <!-- スコア表示 -->
  <div class="header-card">
    <p class="text-[#00d4ff] font-mono tracking-widest text-sm mb-2">DX推進指数</p>
    <h1 id="totalScore" class="header-score">0</h1>
    <p class="text-slate-400 text-xs mt-4">※全回答企業データに基づく集計結果</p>
  </div>

  <!-- 診断結果の概要 -->
  <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm flex items-center justify-between">
    <div>
      <p class="text-xs text-slate-500 font-bold">あなたの診断ステージ</p>
      <p id="userStageName" class="text-xl font-black text-indigo-600">-</p>
    </div>
    <div class="text-right">
      <p id="userIndustry" class="text-xs text-slate-500 font-medium">-</p>
      <p id="userSize" class="text-xs text-slate-500 font-medium">-</p>
    </div>
  </div>

  <!-- 比較グラフセクション -->
  <div id="charts" class="space-y-4"></div>
</div>

<!-- エラー表示 -->
<div id="errorView" class="hidden max-w-md mx-auto mt-20 text-center p-8 bg-white rounded-3xl shadow-lg border border-rose-100">
  <p class="text-rose-600 font-bold text-lg">データの読み込みに失敗しました</p>
  <p class="text-slate-500 text-sm mt-2">アンケート回答後にこのページへアクセスしてください。</p>
</div>

<script>
// ステージの名称定義
const STAGE_NAMES = [
  "未着手", "一部で実施中", "一部で推進中", "横断的に推進中", "モニタリング中", "価値を創出中"
];

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function init() {
  // URLからデータを取得
  const score = parseInt(getParam('score')) || 0;
  const stage = parseInt(getParam('stage'));
  const industry = getParam('industry') || "指定なし";
  const size = getParam('size') || "指定なし";
  
  // 比較用平均値（URLにない場合はデフォルト値を表示）
  const avgOverall = parseFloat(getParam('avg_all')) || 3.8;
  const avgInd = parseFloat(getParam('avg_ind')) || 3.2;
  const avgSize = parseFloat(getParam('avg_size')) || 2.5;

  if (!stage) {
    document.getElementById('errorView').classList.remove('hidden');
    return;
  }

  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('userStageName').textContent = `${stage}. ${STAGE_NAMES[stage-1]}`;
  document.getElementById('userIndustry').textContent = `業種：${industry}`;
  document.getElementById('userSize').textContent = `規模：${size}`;

  // 比較リストの作成
  const comparisons = [
    { label: "全体平均", value: avgOverall, color: "bg-slate-400" },
    { label: `同業種平均 (${industry})`, value: avgInd, color: "bg-indigo-400" },
    { label: `同規模平均 (${size})`, value: avgSize, color: "bg-cyan-400" }
  ];

  const chartContainer = document.getElementById('charts');
  comparisons.forEach(item => {
    const diff = (stage - item.value).toFixed(1);
    const card = document.createElement('div');
    card.className = "bg-white p-6 rounded-3xl border border-slate-200 shadow-sm";
    card.innerHTML = `
      <div class="flex justify-between items-end mb-4">
        <div>
          <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">${item.label}</p>
          <p class="text-3xl font-black text-slate-800">${item.value}</p>
        </div>
        <p class="text-sm font-bold ${diff >= 0 ? 'text-cyan-600' : 'text-rose-500'}">
          自社との差: ${diff >= 0 ? "+" : ""}${diff}
        </p>
      </div>
      <div class="bar-container">
        <div class="bar-fill ${item.color}" style="width: ${(item.value / 6) * 100}%"></div>
        <!-- ユーザーの現在位置をピン立て -->
        <div class="absolute top-0 w-1 h-full bg-indigo-600 z-10" style="left: ${(stage / 6) * 100}%">
          <span class="absolute -top-1 -left-1 w-3 h-3 bg-indigo-600 rounded-full border-2 border-white"></span>
        </div>
      </div>
      <div class="flex justify-between mt-1 text-[10px] text-slate-400 font-bold">
        <span>STAGE 1</span><span>STAGE 6</span>
      </div>
    `;
    chartContainer.appendChild(card);
  });

  // スコアのアニメーション
  let current = 0;
  const timer = setInterval(() => {
    current += 1000;
    if (current >= score) { current = score; clearInterval(timer); }
    document.getElementById('totalScore').textContent = current.toLocaleString();
  }, 20);
}

init();
</script>
</body>
</html>
