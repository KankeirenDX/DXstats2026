<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>関西DX指標 - 診断分析レポート</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
    .header-gradient {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-bottom: 4px solid #3b82f6;
    }
    .score-glitter {
      font-family: 'Share Tech Mono', monospace;
      color: #3b82f6;
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
    /* グラフのスタックバー（分布）のスタイル */
    .dist-bar { height: 24px; display: flex; border-radius: 4px; overflow: hidden; background: #e2e8f0; }
    .dist-segment { height: 100%; transition: all 0.5s ease; position: relative; }
    .user-pointer {
      position: absolute; top: -8px; width: 4px; height: 40px;
      background: #ef4444; z-index: 20; transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    }
    .user-pointer::after {
      content: 'YOUR POS'; position: absolute; top: -18px; left: 50%;
      transform: translateX(-50%); font-size: 8px; font-weight: 900; color: #ef4444; white-space: nowrap;
    }
  </style>
</head>
<body class="pb-20">

  <!-- Header -->
  <header class="header-gradient text-white py-10 px-6 mb-8 shadow-xl">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
      <div class="text-center md:text-left">
        <p class="text-blue-400 font-mono tracking-widest text-sm mb-1">KANSAI DX INDEX REPORT</p>
        <h1 class="text-3xl font-black italic tracking-tighter">関西DX推進指標 <span class="text-blue-500">2026</span></h1>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-6 text-center backdrop-blur-sm">
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Points</p>
        <span id="scoreDisplay" class="score-glitter text-5xl font-black">14,582</span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 space-y-8">
    
    <!-- ユーザー入力エリア -->
    <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="bg-slate-50 border-bottom border-slate-100 px-6 py-3">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider italic">Profile Settings / 条件設定</p>
      </div>
      <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-xs font-black text-slate-700 mb-2">診断ステージ</label>
          <select id="stageSelect" onchange="renderCharts()" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm font-bold outline-none transition-all">
            <option value="1">Stage 1: 未着手</option>
            <option value="2">Stage 2: 一部で実施中</option>
            <option value="3">Stage 3: 一部で推進中</option>
            <option value="4">Stage 4: 横断的に推進中</option>
            <option value="5">Stage 5: モニタリング中</option>
            <option value="6">Stage 6: 価値を創出中</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-black text-slate-700 mb-2">業種</label>
          <select id="indSelect" onchange="renderCharts()" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm font-bold outline-none transition-all">
            <option value="製造業">製造業</option>
            <option value="卸売業">卸売業</option>
            <option value="サービス業">サービス業</option>
            <option value="IT・通信">IT・通信</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-black text-slate-700 mb-2">企業規模</label>
          <select id="sizeSelect" onchange="renderCharts()" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm font-bold outline-none transition-all">
            <option value="5人以下">5人以下</option>
            <option value="21～50人">21～50人</option>
            <option value="101～300人">101～300人</option>
            <option value="2,001人以上">2,001人以上</option>
          </select>
        </div>
      </div>
    </section>

    <!-- グラフ表示エリア -->
    <div id="chartContainer" class="grid grid-cols-1 gap-6">
      <!-- JavaScriptでここにカードが生成されます -->
    </div>

  </main>

  <script>
    // 統計データ（分布割合 %）
    const DATA_MASTER = {
      overall: { label: "全体平均", avg: 3.8, dist: [12, 22, 28, 18, 12, 8] },
      industries: {
        "製造業": { avg: 3.2, dist: [15, 30, 25, 20, 8, 2] },
        "卸売業": { avg: 3.5, dist: [10, 25, 35, 20, 7, 3] },
        "サービス業": { avg: 4.1, dist: [5, 15, 30, 30, 15, 5] },
        "IT・通信": { avg: 4.8, dist: [2, 8, 20, 35, 25, 10] }
      },
      sizes: {
        "5人以下": { avg: 2.1, dist: [40, 35, 15, 7, 2, 1] },
        "21～50人": { avg: 2.9, dist: [20, 40, 25, 10, 4, 1] },
        "101～300人": { avg: 3.8, dist: [5, 20, 45, 20, 8, 2] },
        "2,001人以上": { avg: 4.8, dist: [1, 5, 20, 40, 25, 9] }
      }
    };

    const COLORS = ['#cbd5e1', '#94a3b8', '#64748b', '#3b82f6', '#2563eb', '#1e3a8a'];

    function renderCharts() {
      const stage = parseInt(document.getElementById('stageSelect').value);
      const ind = document.getElementById('indSelect').value;
      const size = document.getElementById('sizeSelect').value;
      const container = document.getElementById('chartContainer');
      
      container.innerHTML = "";

      const viewList = [
        DATA_MASTER.overall,
        { ...DATA_MASTER.industries[ind], label: `同業種平均 (${ind})` },
        { ...DATA_MASTER.sizes[size], label: `同規模平均 (${size})` }
      ];

      viewList.forEach(item => {
        const diff = (stage - item.avg).toFixed(1);
        const card = document.createElement('div');
        card.className = "bg-white p-8 rounded-3xl shadow-sm border border-slate-200 relative overflow-visible";
        
        // 自社位置の計算 (1~6を0%~100%に変換)
        const pointerPos = ((stage - 0.5) / 6) * 100;

        card.innerHTML = `
          <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
              <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-2">${item.label}</h3>
              <div class="flex items-baseline gap-3">
                <span class="text-5xl font-black text-slate-800">${item.avg}</span>
                <span class="text-sm font-bold px-3 py-1 rounded-full ${diff >= 0 ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-700'}">
                  自社との差: ${diff >= 0 ? "+" : ""}${diff}
                </span>
              </div>
            </div>
            <div class="text-right hidden md:block">
              <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Benchmark Distribution</p>
            </div>
          </div>

          <div class="relative pt-6 pb-2">
            <!-- 自社のピン -->
            <div class="user-pointer" style="left: ${pointerPos}%"></div>
            
            <!-- 分布棒グラフ -->
            <div class="dist-bar">
              ${item.dist.map((pct, i) => `
                <div class="dist-segment" style="width: ${pct}%; background-color: ${COLORS[i]};" title="Stage ${i+1}: ${pct}%">
                </div>
              `).join("")}
            </div>

            <!-- 目盛り -->
            <div class="flex justify-between mt-4">
              ${[1,2,3,4,5,6].map(num => `
                <div class="text-center w-full">
                  <span class="text-[10px] font-black ${num === stage ? 'text-blue-600' : 'text-slate-400'}">ST ${num}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 初回実行
    renderCharts();
  </script>
</body>
</html>
